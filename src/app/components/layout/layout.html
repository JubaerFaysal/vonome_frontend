<!-- Desktop Layout -->
<div class="flex h-screen overflow-hidden bg-gray-50/50">

  <!-- Sidebar (hidden on mobile) -->
  <aside class="hidden md:fixed md:left-0 md:top-0 md:bottom-0 md:flex w-64 flex-col z-20 glass-panel shrink-0">
    <!-- Logo -->
    <div class="h-20 flex items-center px-6 border-b border-gray-200/50 shrink-0">
      <div class="w-10 h-10 bg-gradient-to-tr from-primary-500 to-primary-400 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary-500/30 shrink-0">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
        </svg>
      </div>
      <div class="ml-4 flex flex-col min-w-0">
        <span class="text-xl font-bold text-gray-900 leading-tight">Vonome</span>
        <span class="text-xs font-medium text-primary-600">Pharmacy POS</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="bg-primary-50 text-primary-700 font-semibold shadow-sm border border-primary-100"
         #rla="routerLinkActive"
         [class.text-gray-600]="!rla.isActive"
         [class.hover:bg-gray-100]="!rla.isActive"
         class="group flex items-center px-3 py-3 rounded-lg transition-all duration-200 cursor-pointer">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors duration-200 mr-3 shrink-0"
             [class]="rla.isActive ? 'bg-primary-100 text-primary-600' : 'text-gray-400 group-hover:text-gray-600'">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"/>
          </svg>
        </div>
        <span class="text-sm font-medium truncate">{{ item.label }}</span>
        <span *ngIf="rla.isActive" class="ml-auto w-1.5 h-1.5 rounded-full bg-primary-500 shrink-0"></span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 relative md:ml-64 h-screen">
    <div class="absolute inset-0 bg-white/40 pointer-events-none"></div>
    <!-- Mobile top bar -->
    <div class="md:hidden flex items-center px-4 py-3 bg-white border-b border-gray-200 shrink-0 relative z-10">
      <div class="w-8 h-8 bg-gradient-to-tr from-primary-500 to-primary-400 rounded-lg flex items-center justify-center text-white shadow-md shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
        </svg>
      </div>
      <span class="ml-3 font-bold text-gray-900">Vonome POS</span>
    </div>

    <div class="relative flex-1 flex flex-col z-10 animate-fade-in overflow-hidden pb-16 md:pb-0" style="min-height: 0;">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Mobile Bottom Nav -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 flex">
  <a *ngFor="let item of navItems"
     [routerLink]="item.route"
     routerLinkActive="text-primary-600"
     #rlaM="routerLinkActive"
     [class.text-gray-400]="!rlaM.isActive"
     class="flex-1 flex flex-col items-center justify-center py-2 gap-1 text-xs font-medium transition-colors">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"/>
    </svg>
    <span>{{ item.label }}</span>
  </a>
</nav>
