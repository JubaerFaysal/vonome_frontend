<div class="flex h-screen overflow-hidden bg-gray-50/50">
  <!-- Sidebar -->
  <aside class="w-64 flex flex-col z-20 glass-panel">
    <!-- Logo area -->
    <div class="h-20 flex items-center px-6 border-b border-gray-200/50">
      <div class="w-10 h-10 bg-gradient-to-tr from-primary-500 to-primary-400 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary-500/30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
      </div>
      <div class="ml-4 flex flex-col">
        <span class="text-xl font-bold text-gray-900 leading-tight">Vonome</span>
        <span class="text-xs font-medium text-primary-600">Pharmacy POS</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto custom-scrollbar">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="bg-primary-50 text-primary-700 font-semibold shadow-sm border border-primary-100"
         #rla="routerLinkActive"
         [class.text-gray-600]="!rla.isActive"
         [class.hover:bg-gray-100]="!rla.isActive"
         class="group flex items-center px-3 py-3 rounded-xl transition-all duration-200 cursor-pointer">
        
        <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors duration-200 mr-3"
             [class]="rla.isActive ? 'bg-primary-100 text-primary-600' : 'text-gray-400 group-hover:text-gray-600'">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
          </svg>
        </div>
        
        <span class="text-sm font-medium">{{ item.label }}</span>
        
        <!-- Active indicator dot -->
        <span *ngIf="rla.isActive" class="ml-auto w-1.5 h-1.5 rounded-full bg-primary-500"></span>
      </a>
    </nav>
    
    <!-- User profiles bottom -->
    <div class="p-4 m-4 rounded-xl bg-white border border-gray-200/50 shadow-sm flex items-center">
      <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-100 to-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-white shadow-sm">
        AM
      </div>
      <div class="ml-3 flex flex-col min-w-0">
        <span class="text-sm font-bold text-gray-900 truncate">Admin User</span>
        <span class="text-xs text-gray-500 truncate">admin@vonome.com</span>
      </div>
    </div>
  </aside>

  <!-- Main Content wrapper -->
  <main class="flex-1 flex flex-col min-w-0 relative">
    <div class="absolute inset-0 bg-white/40 pointer-events-none"></div>
    <div class="relative flex-1 flex flex-col z-10 animate-fade-in overflow-hidden h-full">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
