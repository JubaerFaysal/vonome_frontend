<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm" (click)="onBackdropClick($event)">
  <div class="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all" (click)="$event.stopPropagation()">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-2xl">
      <h2 class="text-xl font-bold text-gray-800">Add New Customer</h2>
      <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600 p-1 hover:bg-gray-200 rounded-full transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      <!-- Customer Type -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Customer type <span class="text-red-500">*</span></label>
        <div class="flex space-x-6">
          <label class="flex items-center cursor-pointer">
            <input type="radio" formControlName="type" value="individual" class="w-4 h-4 text-primary-500 focus:ring-primary-500 border-gray-300">
            <span class="ml-2 text-sm text-gray-700">Individual</span>
          </label>
          <label class="flex items-center cursor-pointer">
            <input type="radio" formControlName="type" value="business" class="w-4 h-4 text-primary-500 focus:ring-primary-500 border-gray-300">
            <span class="ml-2 text-sm text-gray-700">Business</span>
          </label>
        </div>
      </div>

      <!-- Customer Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Customer name <span class="text-red-500">*</span></label>
        <div class="flex space-x-2">
          <select formControlName="title" class="w-20 p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none bg-gray-50">
            <option value="Mr.">Mr.</option>
            <option value="Mrs.">Mrs.</option>
            <option value="Ms.">Ms.</option>
            <option value="Dr.">Dr.</option>
          </select>
          <input 
            type="text" 
            formControlName="name"
            placeholder="Enter customer name"
            class="flex-1 p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"
            [class.border-red-500]="f['name'].touched && f['name'].errors"
          >
        </div>
        <div *ngIf="f['name'].touched && f['name'].errors" class="text-red-500 text-xs mt-1">
          Name is required
        </div>
      </div>

      <!-- Display Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Display name <span class="text-red-500">*</span></label>
        <input 
          type="text" 
          formControlName="displayName"
          placeholder="Enter display name"
          class="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"
          [class.border-red-500]="f['displayName'].touched && f['displayName'].errors"
        >
        <div *ngIf="f['displayName'].touched && f['displayName'].errors" class="text-red-500 text-xs mt-1">
          Display name is required
        </div>
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone <span class="text-red-500">*</span></label>
        <div class="flex space-x-2">
          <div class="flex items-center px-3 bg-gray-100 border border-gray-200 rounded-lg">
            <span class="text-lg mr-1">🇧🇩</span>
            <span class="text-sm text-gray-600 font-medium">+880</span>
          </div>
          <input 
            type="tel" 
            formControlName="phone"
            placeholder="1XXXXXXXXX"
            class="flex-1 p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"
            [class.border-red-500]="f['phone'].touched && f['phone'].errors"
          >
        </div>
        <div *ngIf="f['phone'].touched && f['phone'].errors" class="text-red-500 text-xs mt-1">
          Valid 10-11 digit phone number required
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="Enter email address"
          class="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"
          [class.border-red-500]="f['email'].touched && f['email'].errors"
        >
        <div *ngIf="f['email'].touched && f['email'].errors" class="text-red-500 text-xs mt-1">
          Valid email is required
        </div>
      </div>

      <!-- Billing Address -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Billing address</label>
        <textarea 
          formControlName="billingAddress"
          rows="3"
          placeholder="E.g., Road no 1, Abc Building, Floor 2"
          class="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none resize-none"
        ></textarea>
      </div>

      <!-- Actions -->
      <div class="flex space-x-3 pt-4">
        <button 
          type="button"
          (click)="close.emit()"
          class="flex-1 py-3 border border-gray-300 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition-colors"
        >
          Cancel
        </button>
        <button 
          type="submit"
          [disabled]="customerForm.invalid || loading"
          class="flex-1 py-3 bg-primary-500 text-white rounded-xl font-medium hover:bg-primary-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-lg shadow-primary-500/30"
        >
          {{ loading ? 'Adding...' : 'Add customer' }}
        </button>
      </div>
    </form>
  </div>
</div>
